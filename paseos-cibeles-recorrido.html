<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Áreas Verdes · Paseos Cibeles — Lo que viene · Irapuato Guanajuato</title>
  <meta name="description" content="Recorre las áreas verdes proyectadas de Paseos Cibeles. Irapuato, Guanajuato."/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --gold:#c8a84b;
      --gold-light:rgba(200,168,75,.12);
      --green:#4a5c2a;
      --dark:#060c04;
      --cream:#faf8f3;
      --warm:#f5f0e6;
      --text-dark:#2a1f0e;
      --text-mid:rgba(80,60,20,.55);
    }
    *,*::before,*::after{ margin:0; padding:0; box-sizing:border-box; }
    html,body{ height:100%; overflow:hidden; background:var(--dark); }
    body{ font-family:'Inter',sans-serif; color:#fff; }

    /* ══════════════════════════════════════════
       INTRO — fondo cálido, luz, elegancia
    ══════════════════════════════════════════ */
    #intro{
      position:fixed; inset:0; z-index:900;
      background:linear-gradient(155deg, #fcfaf6 0%, #f7f0e3 45%, #faf8f4 100%);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      overflow:hidden;
      transition:opacity 1s ease, transform 1s cubic-bezier(.4,0,.2,1);
    }
    #intro.exit{
      opacity:0;
      transform:scale(1.015) translateY(-5px);
      pointer-events:none;
    }

    /* Partículas de luz (JS) */
    .ipt{
      position:absolute; border-radius:50%;
      animation:ipt-float var(--d) var(--dl) ease-in-out infinite;
      pointer-events:none;
    }
    @keyframes ipt-float{
      0%  { transform:translateY(0)   translateX(0) scale(1);   opacity:0; }
      12% { opacity:1; }
      82% { opacity:1; }
      100%{ transform:translateY(var(--dy)) translateX(var(--dx)) scale(.4); opacity:0; }
    }

    /* Glow radial detrás del logo */
    .i-halo{
      position:absolute;
      width:700px; height:700px; border-radius:50%;
      background:radial-gradient(circle,
        rgba(200,168,75,.22) 0%,
        rgba(200,168,75,.10) 35%,
        rgba(200,168,75,.04) 60%,
        transparent 75%);
      pointer-events:none;
      transform:scale(0);
      animation:halo-in 2s .05s cubic-bezier(.15,0,.1,1) forwards;
    }
    .i-halo::after{
      content:''; position:absolute; inset:-60px; border-radius:50%;
      border:1px solid rgba(200,168,75,.18);
      animation:halo-ring 6s 2s ease-in-out infinite alternate;
    }
    @keyframes halo-in{ to{ transform:scale(1); } }
    @keyframes halo-ring{ 0%{transform:scale(.92);opacity:.4} 100%{transform:scale(1.06);opacity:.9} }

    /* ── BOTANICAL SVG — PANTALLA COMPLETA ── */
    .i-botanico{
      position:absolute; inset:0;
      width:100%; height:100%; pointer-events:none;
      overflow:visible;
    }
    .vine{ fill:none; stroke-linecap:round; stroke-linejoin:round; }

    /* Grow-in per vine (dasharray ajustados a paths más largos) */
    .v1 { stroke-dasharray:1400;stroke-dashoffset:1400;animation:vine-grow 1.1s .1s  ease-out forwards;}
    .v2 { stroke-dasharray:1200;stroke-dashoffset:1200;animation:vine-grow 1.0s .22s ease-out forwards;}
    .v3 { stroke-dasharray:1400;stroke-dashoffset:1400;animation:vine-grow 1.1s .14s ease-out forwards;}
    .v4 { stroke-dasharray:1200;stroke-dashoffset:1200;animation:vine-grow 1.0s .26s ease-out forwards;}
    .v5 { stroke-dasharray:600; stroke-dashoffset:600; animation:vine-grow .65s .7s  ease-out forwards;}
    .v6 { stroke-dasharray:600; stroke-dashoffset:600; animation:vine-grow .65s .74s ease-out forwards;}
    .v7 { stroke-dasharray:400; stroke-dashoffset:400; animation:vine-grow .5s  .95s ease-out forwards;}
    .v8 { stroke-dasharray:400; stroke-dashoffset:400; animation:vine-grow .5s  .98s ease-out forwards;}
    .v9 { stroke-dasharray:700; stroke-dashoffset:700; animation:vine-grow .7s  .32s ease-out forwards;}
    .v10{ stroke-dasharray:700; stroke-dashoffset:700; animation:vine-grow .7s  .36s ease-out forwards;}
    .v11{ stroke-dasharray:350; stroke-dashoffset:350; animation:vine-grow .45s 1.15s ease-out forwards;}
    .v12{ stroke-dasharray:350; stroke-dashoffset:350; animation:vine-grow .45s 1.18s ease-out forwards;}
    .v13{ stroke-dasharray:280; stroke-dashoffset:280; animation:vine-grow .38s 1.35s ease-out forwards;}
    .v14{ stroke-dasharray:280; stroke-dashoffset:280; animation:vine-grow .38s 1.38s ease-out forwards;}
    @keyframes vine-grow{ to{ stroke-dashoffset:0; } }

    /* Arm sway — groups pivot at center bottom (700,900) */
    .arm-l{
      transform-box:view-box; transform-origin:700px 900px;
      will-change:transform;
      animation:sway-l 8s 1.2s ease-in-out infinite alternate;
    }
    .arm-r{
      transform-box:view-box; transform-origin:700px 900px;
      will-change:transform;
      animation:sway-r 7.5s 1.2s ease-in-out infinite alternate;
    }
    .arm-top{
      transform-box:view-box; transform-origin:700px 0px;
      will-change:transform;
      animation:sway-top 9s 1.5s ease-in-out infinite alternate;
    }
    @keyframes sway-l{
      0%  { transform:rotate(0deg); }
      45% { transform:rotate(-3.5deg); }
      100%{ transform:rotate(-1.5deg); }
    }
    @keyframes sway-r{
      0%  { transform:rotate(0deg); }
      45% { transform:rotate(3.5deg); }
      100%{ transform:rotate(1.5deg); }
    }
    @keyframes sway-top{
      0%  { transform:rotate(0deg); }
      50% { transform:rotate(1.5deg); }
      100%{ transform:rotate(-1.5deg); }
    }

    /* Bloom entrada + respiración continua */
    .bloom{ transform-box:fill-box; transform-origin:center; opacity:0; }
    .b1 { animation:bloom-in .55s 1.1s  cubic-bezier(.2,0,.1,1.5) forwards, flower-breathe-a 4.2s 1.75s ease-in-out infinite alternate; }
    .b2 { animation:bloom-in .55s 1.15s cubic-bezier(.2,0,.1,1.5) forwards, flower-breathe-b 4.6s 1.8s  ease-in-out infinite alternate; }
    .b3 { animation:bloom-in .45s 1.3s  cubic-bezier(.2,0,.1,1.5) forwards, flower-breathe-c 3.8s 1.9s  ease-in-out infinite alternate; }
    .b4 { animation:bloom-in .45s 1.35s cubic-bezier(.2,0,.1,1.5) forwards, flower-breathe-a 4.0s 2.0s  ease-in-out infinite alternate; }
    .b5 { animation:bloom-in .4s  1.5s  cubic-bezier(.2,0,.1,1.5) forwards, flower-breathe-b 3.4s 2.1s  ease-in-out infinite alternate; }
    .b6 { animation:bloom-in .4s  1.55s cubic-bezier(.2,0,.1,1.5) forwards, flower-breathe-c 3.6s 2.2s  ease-in-out infinite alternate; }
    .b7 { animation:bloom-in .35s 1.65s cubic-bezier(.2,0,.1,1.5) forwards, flower-breathe-a 5.2s 2.3s  ease-in-out infinite alternate; }
    .b8 { animation:bloom-in .35s 1.7s  cubic-bezier(.2,0,.1,1.5) forwards, flower-breathe-b 5.0s 2.4s  ease-in-out infinite alternate; }
    .b9 { animation:bloom-in .3s  1.8s  cubic-bezier(.2,0,.1,1.5) forwards, flower-breathe-c 3.2s 2.5s  ease-in-out infinite alternate; }
    .b10{ animation:bloom-in .3s  1.85s cubic-bezier(.2,0,.1,1.5) forwards, flower-breathe-a 3.4s 2.6s  ease-in-out infinite alternate; }
    .b11{ animation:bloom-in .28s 1.95s cubic-bezier(.2,0,.1,1.5) forwards, flower-breathe-b 4.4s 2.7s  ease-in-out infinite alternate; }
    .b12{ animation:bloom-in .28s 2.0s  cubic-bezier(.2,0,.1,1.5) forwards, flower-breathe-c 4.8s 2.8s  ease-in-out infinite alternate; }
    @keyframes bloom-in{
      from{ transform:scale(0) rotate(-25deg); opacity:0; }
      to  { transform:scale(1) rotate(0deg);   opacity:1; }
    }
    @keyframes flower-breathe-a{
      0%  { transform:scale(1)    rotate(0deg);  opacity:1; }
      100%{ transform:scale(1.28) rotate(20deg); opacity:1; }
    }
    @keyframes flower-breathe-b{
      0%  { transform:scale(1)    rotate(0deg);   opacity:1; }
      100%{ transform:scale(1.22) rotate(-16deg); opacity:1; }
    }
    @keyframes flower-breathe-c{
      0%  { transform:scale(1)    rotate(0deg);  opacity:1; }
      100%{ transform:scale(1.30) rotate(24deg); opacity:1; }
    }

    /* Vine shimmer pulse */
    .vine-shimmer{ animation:vine-shimmer 4s ease-in-out infinite alternate; }
    @keyframes vine-shimmer{ 0%{opacity:.35} 100%{opacity:.65} }

    /* Floating petals (JS-created) */
    .fpetal{
      position:absolute;
      border-radius:60% 40% 60% 40% / 40% 60% 40% 60%;
      opacity:0; pointer-events:none;
      animation:fpetal-float var(--dur) var(--delay) ease-in-out infinite;
    }
    @keyframes fpetal-float{
      0%  { transform:translateY(0) translateX(0) rotate(0deg) scale(1); opacity:0; }
      8%  { opacity:var(--op); }
      88% { opacity:var(--op); }
      100%{ transform:translateY(var(--dy)) translateX(var(--dx)) rotate(var(--rot)) scale(.3); opacity:0; }
    }

    /* Logo — glow separado del img para evitar pixelación por blend-mode+filter */
    .i-logo-wrap{
      position:relative;
      display:flex; align-items:center; justify-content:center;
      z-index:1;
      width:380px; height:380px;
    }
    /* Glow en un elemento aparte — nunca toca el img */
    .i-logo-glow{
      position:absolute; inset:-60px;
      border-radius:50%;
      opacity:0;
      animation:logo-glow 3.2s .4s cubic-bezier(.15,0,.05,1) forwards;
      pointer-events:none;
    }
    @keyframes logo-glow{
      0%  { opacity:0;   transform:scale(.7); background:radial-gradient(circle, rgba(200,168,75,0) 0%, transparent 60%); }
      25% { opacity:.5;  transform:scale(1);  background:radial-gradient(circle, rgba(200,168,75,.18) 10%, rgba(200,168,75,.06) 45%, transparent 65%); }
      55% { opacity:1;   transform:scale(1.15); background:radial-gradient(circle, rgba(200,168,75,.42) 10%, rgba(200,168,75,.18) 40%, transparent 68%); }
      80% { opacity:.85; transform:scale(1.05); background:radial-gradient(circle, rgba(200,168,75,.25) 15%, rgba(200,168,75,.08) 50%, transparent 70%); }
      100%{ opacity:1;   transform:scale(1);  background:radial-gradient(circle, rgba(200,168,75,.15) 15%, rgba(200,168,75,.05) 50%, transparent 70%); }
    }
    /* Glow pulsante continuo después de la entrada */
    .i-logo-glow.ready{
      animation:logo-glow 3.2s .4s cubic-bezier(.15,0,.05,1) forwards,
                logo-pulse 4s 3.8s ease-in-out infinite alternate;
    }
    @keyframes logo-pulse{
      0%  { transform:scale(1);    opacity:.8; }
      100%{ transform:scale(1.08); opacity:1; }
    }
    /* Logo — fondo ya removido del PNG, sin blend-mode */
    .i-logo{
      position:absolute; inset:0;
      width:100%; height:100%;
      display:block;
      opacity:0;
      will-change:transform,opacity;
      animation:logo-cin 3.2s .4s cubic-bezier(.15,0,.05,1) forwards;
    }
    @keyframes logo-cin{
      0%  { opacity:0;   transform:scale(.88); }
      25% { opacity:.65; transform:scale(1.03); }
      55% { opacity:1;   transform:scale(.99); }
      80% { opacity:1;   transform:scale(1.006); }
      100%{ opacity:1;   transform:scale(1); }
    }

    /* Línea dorada decorativa */
    .i-rule{
      display:flex; align-items:center; gap:14px;
      margin-top:30px; z-index:1;
      opacity:0; animation:i-fadeup .7s 2.4s ease forwards;
    }
    .i-rule::before,.i-rule::after{
      content:''; display:block;
      width:40px; height:1px;
      background:linear-gradient(to right, transparent, rgba(200,168,75,.5));
    }
    .i-rule::after{ background:linear-gradient(to left, transparent, rgba(200,168,75,.5)); }
    .i-rule-dot{
      width:4px; height:4px; border-radius:50%;
      background:var(--gold); opacity:.5;
    }

    /* Título */
    .i-title{
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(26px,4vw,34px);
      font-weight:400; letter-spacing:.18em;
      color:var(--text-dark);
      margin-top:18px; z-index:1;
      opacity:0; transform:translateY(8px);
      animation:i-fadeup .85s 2.6s cubic-bezier(.2,0,.1,1) forwards;
    }

    /* Subtítulo */
    .i-sub{
      font-family:'Inter',sans-serif;
      font-size:10.5px; font-weight:300;
      letter-spacing:.28em; text-transform:uppercase;
      color:var(--text-mid);
      margin-top:10px; z-index:1;
      opacity:0;
      animation:i-fadeup .7s 3.1s ease forwards;
    }

    /* Botones de sonido */
    .i-sound-row{
      margin-top:48px; z-index:1;
      display:flex; flex-direction:column; align-items:center; gap:10px;
      opacity:0;
      animation:i-fadeup .5s 3.5s ease forwards;
    }
    .i-btn-experience{
      background:transparent;
      border:1px solid rgba(200,168,75,.38);
      color:#7a5e25;
      padding:11px 30px; border-radius:3px;
      font-family:'Inter',sans-serif;
      font-size:9.5px; letter-spacing:.3em; text-transform:uppercase;
      cursor:pointer; transition:all .25s;
      display:flex; align-items:center; gap:9px;
    }
    .i-btn-experience:hover{
      background:rgba(200,168,75,.06);
      border-color:rgba(200,168,75,.75);
      color:#4a3510;
    }
    .i-btn-experience svg{ width:12px; height:12px; fill:#c8a84b; flex-shrink:0; }
    .i-btn-skip{
      background:transparent; border:none;
      color:rgba(100,78,40,.36); font-family:'Inter',sans-serif;
      font-size:9px; letter-spacing:.18em; text-transform:uppercase;
      cursor:pointer; padding:4px;
      transition:color .2s;
    }
    .i-btn-skip:hover{ color:rgba(100,78,40,.65); }

    /* Estado cuando el sonido ya está activo (auto) */
    .i-sound-auto{
      margin-top:44px; z-index:1;
      opacity:0;
      animation:i-fadeup .5s 3.6s ease forwards;
      display:flex; align-items:center; gap:7px;
      font-size:9px; letter-spacing:.2em; text-transform:uppercase;
      color:rgba(140,106,44,.45);
    }
    .i-sound-auto svg{ width:10px; height:10px; fill:rgba(140,106,44,.45); }

    @keyframes i-fadeup{
      from{ opacity:0; transform:translateY(7px); }
      to  { opacity:1; transform:translateY(0); }
    }
    @keyframes i-fade{ from{opacity:0} to{opacity:1} }

    /* ══════════════════════════════════════════
       MAIN APP — oscuro, cinematográfico
    ══════════════════════════════════════════ */
    .canvas{
      position:fixed; inset:0;
      display:grid; grid-template-columns:1fr 420px;
    }
    .img-side{ position:relative; overflow:hidden; }
    .img-slide{
      position:absolute; inset:0;
      background-size:cover; background-position:center;
      opacity:0; transform:scale(1.06);
      transition:opacity .7s ease, transform .7s ease;
    }
    .img-slide.active{ opacity:1; transform:scale(1); }
    .img-fade{
      position:absolute; inset:0;
      background:linear-gradient(90deg,rgba(6,12,4,0) 40%,rgba(6,12,4,.92) 100%);
      pointer-events:none;
    }
    .img-bottom-fade{
      position:absolute; inset:0;
      background:linear-gradient(0deg,rgba(6,12,4,.8) 0%,transparent 40%);
      pointer-events:none;
    }
    .img-counter{
      position:absolute; bottom:28px; left:32px; z-index:10;
      font-size:11px; letter-spacing:3px; text-transform:uppercase;
      color:rgba(255,255,255,.28);
    }
    .img-counter span{ color:var(--gold); font-weight:600; }
    .click-prev,.click-next{
      position:absolute; top:0; bottom:0; width:35%;
      z-index:5; cursor:pointer;
    }
    .click-prev{ left:0; } .click-next{ right:0; }
    .info-side{
      position:relative;
      display:flex; flex-direction:column;
      justify-content:center;
      padding:48px 44px 48px 36px;
      overflow:hidden;
    }
    .info-side::before{
      content:'';
      position:absolute; left:0; top:12%; bottom:12%; width:1px;
      background:linear-gradient(to bottom,transparent,rgba(255,255,255,.07) 30%,rgba(255,255,255,.07) 70%,transparent);
    }
    .phase{
      display:inline-flex; align-items:center; gap:8px;
      background:rgba(200,168,75,.1); border:1px solid rgba(200,168,75,.22);
      padding:5px 14px; border-radius:50px;
      font-size:10px; font-weight:600; letter-spacing:2.5px;
      text-transform:uppercase; color:var(--gold);
      width:fit-content; margin-bottom:22px;
      opacity:0; transform:translateY(8px);
      transition:opacity .35s .05s, transform .35s .05s;
    }
    .phase .blink{
      width:5px; height:5px; border-radius:50%;
      background:var(--gold); animation:blink 2s ease infinite;
    }
    @keyframes blink{ 0%,100%{opacity:1} 50%{opacity:.25} }
    .zone-name{
      font-family:'Playfair Display',serif;
      font-size:clamp(38px,3.2vw,54px); font-weight:700; line-height:1.0;
      color:#fff; margin-bottom:6px;
      opacity:0; transform:translateY(14px);
      transition:opacity .35s .1s, transform .35s .1s;
    }
    .zone-name em{ color:var(--gold); font-style:italic; display:block; }
    .zone-tag{
      font-size:13px; color:rgba(255,255,255,.32);
      letter-spacing:.5px; margin-bottom:36px;
      opacity:0; transform:translateY(10px);
      transition:opacity .35s .15s, transform .35s .15s;
    }
    .feats{
      display:flex; flex-direction:column; gap:10px;
      opacity:0; transform:translateY(8px);
      transition:opacity .35s .2s, transform .35s .2s;
    }
    .feat{
      display:flex; align-items:center; gap:14px;
      padding:13px 18px; border-radius:12px;
      background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07);
      transition:background .2s;
    }
    .feat:hover{ background:rgba(255,255,255,.08); }
    .feat-icon{ font-size:20px; flex-shrink:0; line-height:1; }
    .feat-text{ font-size:13px; font-weight:500; color:rgba(255,255,255,.7); line-height:1.4; }
    .feat-text small{ display:block; font-size:11px; color:rgba(255,255,255,.3); font-weight:400; margin-top:2px; }
    .wa-btn{
      display:inline-flex; align-items:center; gap:10px;
      background:#25D366; color:#fff; padding:13px 22px;
      border-radius:10px; font-weight:600; font-size:13px;
      text-decoration:none; margin-top:28px; width:fit-content;
      opacity:0; transform:translateY(8px);
      transition:opacity .35s .28s, transform .35s .28s, box-shadow .2s;
    }
    .wa-btn:hover{ box-shadow:0 8px 24px rgba(37,211,102,.4); }
    .wa-btn svg{ width:17px; height:17px; fill:white; flex-shrink:0; }
    .info-side.ready .phase,
    .info-side.ready .zone-name,
    .info-side.ready .zone-tag,
    .info-side.ready .feats,
    .info-side.ready .wa-btn{ opacity:1; transform:translateY(0); }
    .nav-bar{
      position:fixed; bottom:0; left:0; right:420px; z-index:20;
      padding:16px 32px 20px;
      display:flex; align-items:center; gap:10px;
      background:linear-gradient(0deg,rgba(6,12,4,1) 40%,transparent);
    }
    .nav-arrow{
      width:34px; height:34px; border-radius:50%;
      background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1);
      color:rgba(255,255,255,.5); font-size:18px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:all .2s; flex-shrink:0;
    }
    .nav-arrow:hover{ background:var(--gold); border-color:var(--gold); color:#1a1a0a; }
    .nav-arrow:disabled{ opacity:.2; cursor:default; }
    .thumbs{ display:flex; gap:8px; flex:1; overflow-x:auto; padding:0 6px; scrollbar-width:none; }
    .thumbs::-webkit-scrollbar{ display:none; }
    .thumb{
      flex-shrink:0; width:52px; height:36px; border-radius:7px; overflow:hidden;
      border:2px solid transparent; cursor:pointer; transition:border-color .2s; position:relative;
    }
    .thumb img{ width:100%; height:100%; object-fit:cover; display:block; filter:brightness(.55); transition:filter .2s; }
    .thumb.active{ border-color:var(--gold); }
    .thumb.active img{ filter:brightness(1); }
    .thumb:hover img{ filter:brightness(.8); }
    .thumb-num{ position:absolute; bottom:2px; right:4px; font-size:9px; color:rgba(255,255,255,.5); font-weight:600; }
    .top-bar{
      position:fixed; top:0; left:0; right:0; z-index:20; padding:16px 32px;
      display:flex; justify-content:space-between; align-items:center;
      background:linear-gradient(to bottom,rgba(6,12,4,.8),transparent);
    }
    .brand{
      font-family:'Playfair Display',serif; font-size:13px; font-weight:700;
      color:rgba(255,255,255,.5); text-decoration:none; letter-spacing:1px;
    }
    .brand em{ color:var(--gold); font-style:normal; }
    .top-title{ font-size:10px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,.22); }
    .back-link{ font-size:12px; color:rgba(255,255,255,.3); text-decoration:none; transition:color .2s; }
    .back-link:hover{ color:var(--gold); }
    .progress-line{
      position:fixed; top:0; left:0; height:2px;
      background:linear-gradient(90deg,var(--green),var(--gold));
      z-index:100; transition:width .4s ease;
    }
    .key-hint{
      position:fixed; bottom:24px; right:440px; z-index:20;

// ════════════════════════════════════════
//  SONIDO — Web Audio API (sintetizado)
// ════════════════════════════════════════
let audioCtx = null;
let introGone = false;
let soundStarted = false;

function buildSound(ctx){
  const now = ctx.currentTime;
  // Pad cálido: acorde de C mayor (Do, Mi, Sol)
  const pad = ctx.createGain();
  pad.gain.setValueAtTime(0, now);
  pad.gain.linearRampToValueAtTime(.08, now+1.2);
  pad.gain.setValueAtTime(.08, now+3.2);
  pad.gain.linearRampToValueAtTime(0, now+5.5);
  pad.connect(ctx.destination);

  [[261.63,0],[329.63,.12],[392.00,.22]].forEach(([f,d])=>{
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type='sine'; o.frequency.value=f;
    g.gain.value=.04;
    o.connect(g); g.connect(pad);
    o.start(now+d); o.stop(now+6);
  });

  // Campanilla dorada al aparecer el logo (~1.8s)
  setTimeout(()=>{
    if(!audioCtx||audioCtx.state==='closed') return;
    const t=audioCtx.currentTime;
    [1046.5,1318.5,1568].forEach((f,i)=>{
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type='sine'; o.frequency.value=f;
      const ti=t+i*.04;
      g.gain.setValueAtTime(.028,ti);
      g.gain.exponentialRampToValueAtTime(.0001,ti+2.8);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(ti); o.stop(ti+3);
    });
  },1750);
}

function tryAutoSound(){
  try{
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended'){
      showSoundGate(); return;
    }
    buildSound(audioCtx);
    soundStarted=true;
    document.getElementById('soundAuto').style.display='flex';
  }catch(e){
    showSoundGate();
  }
}
function showSoundGate(){
  document.getElementById('soundGate').style.display='flex';
}
function startWithSound(){
  if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  audioCtx.resume().then(()=>{ buildSound(audioCtx); soundStarted=true; });
  document.getElementById('soundGate').style.display='none';
  document.getElementById('soundAuto').style.display='flex';
  // Si ya debería haberse ido la intro, salir
  scheduleExit();
}
function startWithoutSound(){
  document.getElementById('soundGate').style.display='none';
  scheduleExit();
}

//  REVEAL
// ════════════════════════════════════════
let exitScheduled=false;
function scheduleExit(){
  if(exitScheduled) return;
  exitScheduled=true;
  setTimeout(triggerExit, 1200);
}
function triggerExit(){
  if(introGone) return;
  introGone=true;
  const el=document.getElementById('intro');
  el.classList.add('exit');
  setTimeout(()=>el.remove(), 1050);
  // Guardar en session para no repetir
  try{ sessionStorage.setItem('pc_intro','1'); }catch(e){}
}

// ════════════════════════════════════════
//  PÉTALO FLOTANTES — organics que ascienden
// ════════════════════════════════════════
function createFloatingPetals(){
  const intro = document.getElementById('intro');
  if(!intro) return;
  const COUNT = 16;
  const shapes = [
    '60% 40% 60% 40% / 40% 60% 40% 60%',
    '50% 80% 50% 20% / 25% 60% 40% 75%',
    '70% 30% 50% 50% / 50% 50% 70% 30%',
    '35% 65% 60% 40% / 40% 60% 35% 65%',
    '80% 20% 80% 20% / 20% 80% 20% 80%',
  ];
  for(let i=0;i<COUNT;i++){
    const el = document.createElement('div');
    el.className = 'fpetal';
    const size   = 4 + Math.random() * 10;          // 4–14px
    const left   = 10 + Math.random() * 80;          // 10–90% horizontal
    const bottom = -20 + Math.random() * 40;          // start near bottom
    const dy     = -(60 + Math.random() * 35);        // rise 60–95vh
    const dx     = (Math.random() - .5) * 160;        // drift ±80px
    const rot    = (Math.random() - .5) * 540;        // spin ±270deg
    const dur    = 5 + Math.random() * 8;             // 5–13s cycle
    const delay  = -(Math.random() * 12);             // stagger starts (negative = pre-run)
    const op     = .28 + Math.random() * .40;         // 28–68% opacity
    const shape  = shapes[Math.floor(Math.random() * shapes.length)];

    el.style.cssText = `
      width:${size}px; height:${size}px;
      left:${left}%; bottom:${bottom}px;
      border-radius:${shape};
      background:radial-gradient(ellipse, rgba(200,168,75,${op}) 0%, transparent 70%);
      --dur:${dur}s; --delay:${delay}s;
      --dy:${dy}vh; --dx:${dx}px; --rot:${rot}deg; --op:${op};
    `;
    intro.appendChild(el);
  }
}

// ════════════════════════════════════════
//  PARTÍCULAS DE LUZ (halo)
// ════════════════════════════════════════
function spawnLightParticles(){
  const intro = document.getElementById('intro');
  if(!intro) return;
  for(let i=0;i<8;i++){
    const el = document.createElement('div');
    el.className = 'ipt';
    const size = 3 + Math.random()*8;
    el.style.cssText = `
      width:${size}px; height:${size}px;
      left:${20+Math.random()*60}%;
      top:${10+Math.random()*80}%;
      --d:${4+Math.random()*6}s;
      --dl:${-Math.random()*8}s;
      --dy:${-30-Math.random()*120}px;
      --dx:${(Math.random()-.5)*80}px;
      background:radial-gradient(circle, rgba(200,168,75,${.08+Math.random()*.18}) 0%, transparent 70%);
    `.replace('VAR_OP','');
    intro.appendChild(el);
  }
}

// ════════════════════════════════════════
//  INICIO
// ════════════════════════════════════════
// Verificar sesión — quitar "true" para activar la lógica de "solo 1 vez"
const DEV_ALWAYS_SHOW = true;
if(!DEV_ALWAYS_SHOW && sessionStorage.getItem('pc_intro')){
  document.getElementById('intro').remove();
  introGone=true;
} else {
  // Spawn petals + particles as intro loads
  createFloatingPetals();
  spawnLightParticles();
  // Intentar sonido al cargar
  setTimeout(tryAutoSound, 400);
  // Auto-exit a los 5.5s si el usuario no hizo nada
  setTimeout(()=>{
    if(!exitScheduled) scheduleExit();
  }, 5500);
  // Click en intro para saltar
  document.getElementById('intro').addEventListener('click', e=>{
    if(e.target.closest('button')) return; // no disparar desde botones
    if(!exitScheduled) scheduleExit();
  });
}

// ════════════════════════════════════════
//  BUILD + RENDER
// ════════════════════════════════════════
const imgSide=document.getElementById('imgSide');
const thumbsWrap=document.getElementById('thumbsWrap');
ZONES.forEach((z,i)=>{
  const s=document.createElement('div');
  s.className='img-slide'+(i===0?' active':'');
  s.style.backgroundImage=`url('${z.img}')`;
  s.id='slide-'+i; imgSide.appendChild(s);
  const t=document.createElement('div');
  t.className='thumb'+(i===0?' active':'');
  t.id='thumb-'+i; t.onclick=()=>goTo(i);
  t.innerHTML=`<img src="${z.img}" alt="${z.name}" loading="lazy"/><span class="thumb-num">${i+1}</span>`;
  thumbsWrap.appendChild(t);
});

let cur=0,busy=false;
const infoSide=document.getElementById('infoSide');
const phaseEl=document.getElementById('phaseText');
const zoneNameEl=document.getElementById('zoneNameEl');
const zoneTagEl=document.getElementById('zoneTagEl');
const featsEl=document.getElementById('featsEl');
const imgCounter=document.getElementById('imgCounter');
const progressLine=document.getElementById('progressLine');

function renderInfo(z,idx){
  infoSide.classList.remove('ready');
  setTimeout(()=>{
    phaseEl.textContent=z.phase;
    zoneNameEl.innerHTML=z.name+(z.nameEm?`<em>${z.nameEm}</em>`:'');
    zoneTagEl.textContent=z.tag;
    featsEl.innerHTML=z.feats.map(f=>`
      <div class="feat">
        <span class="feat-icon">${f.icon}</span>
        <div class="feat-text">${f.label}<small>${f.desc}</small></div>
      </div>`).join('');
    imgCounter.innerHTML=`<span>${idx+1}</span> / ${ZONES.length}`;
    progressLine.style.width=((idx+1)/ZONES.length*100)+'%';
    requestAnimationFrame(()=>requestAnimationFrame(()=>infoSide.classList.add('ready')));
  },180);
}

function goTo(idx){
  if(busy||idx===cur||idx<0||idx>=ZONES.length) return;
  busy=true;
  document.getElementById('slide-'+cur).classList.remove('active');
  document.getElementById('thumb-'+cur).classList.remove('active');
  document.getElementById('slide-'+idx).classList.add('active');
  document.getElementById('thumb-'+idx).classList.add('active');
  document.getElementById('thumb-'+idx).scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  document.getElementById('btnPrev').disabled=idx===0;
  document.getElementById('btnNext').disabled=idx===ZONES.length-1;
  cur=idx; renderInfo(ZONES[idx],idx);
  setTimeout(()=>busy=false,700);
}
function go(dir){ goTo(cur+dir); }

document.addEventListener('keydown',e=>{
  if(!introGone){ if(!exitScheduled) scheduleExit(); return; }
  if(e.key==='ArrowRight'||e.key==='ArrowDown') go(1);
  if(e.key==='ArrowLeft' ||e.key==='ArrowUp')   go(-1);
});

let tx=null;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{
  if(tx===null)return;
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>50) go(dx<0?1:-1);
  tx=null;
},{passive:true});

// Init
document.getElementById('btnPrev').disabled=true;
renderInfo(ZONES[0],0);
setTimeout(()=>infoSide.classList.add('ready'),100);
